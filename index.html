<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDSC — ChatGPT & Claude 履歴圧縮</title>
  <meta name="description" content="ChatGPT・Claude のAI会話履歴を意味密度で圧縮するWebツール（MDSC / ミーディスク）">
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --border: #1f2937;
      --accent: #06b6d4;
      --accent2: #8b5cf6;
      --text: #e5e7eb;
      --text2: #9ca3af;
      --success: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(6,182,212,0.1), rgba(139,92,246,0.1));
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .header h1 {
      font-size: 1.8em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: var(--text2); font-size: 0.9em; }
    .patent { font-size: 0.75em; color: var(--text2); margin-top: 6px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
    .tab-btn {
      background: none; border: none; color: var(--text2);
      padding: 12px 24px; font-size: 1em; font-weight: 600;
      cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; margin-bottom: 16px;
    }
    .card h3 { font-size: 1.1em; margin-bottom: 12px; color: var(--accent); }
    .dropzone {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 40px 20px; text-align: center; cursor: pointer;
      transition: all 0.3s; margin-bottom: 16px;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent); background: rgba(6,182,212,0.05);
    }
    .dropzone .icon { font-size: 3em; margin-bottom: 12px; }
    .dropzone .label { font-size: 1.1em; font-weight: 600; }
    .dropzone .hint { font-size: 0.85em; color: var(--text2); margin-top: 8px; }
    .btn {
      display: inline-block; padding: 12px 28px; border: none;
      border-radius: 8px; font-size: 1em; font-weight: 600;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .progress-wrap { display: none; margin: 16px 0; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%; transition: width 0.5s;
    }
    .progress-text { font-size: 0.85em; color: var(--text2); margin-top: 6px; text-align: center; }
    .result-area { display: none; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 16px;
    }
    .stat-item {
      background: rgba(6,182,212,0.05); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; text-align: center;
    }
    .stat-value { font-size: 1.5em; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.8em; color: var(--text2); margin-top: 4px; }
    .output-preview {
      background: #000; border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; max-height: 300px; overflow-y: auto;
      font-family: 'Consolas', monospace;
      font-size: 0.85em; white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="container">

<div class="header">
<h1>MDSC — ミーディスク</h1>
<p>ChatGPT & Claude 履歴を意味密度で圧縮</p>
<div class="patent">特願2026-026882 | Meaning Density State Compression</div>
</div>

<div class="card">

<h3>📁 ファイル選択</h3>

<div class="dropzone" onclick="fileInput.click()">
<div class="icon">📤</div>
<div class="label">JSONファイルをドラッグ＆ドロップ</div>
<div class="hint">またはクリックして選択（最大20MB）</div>
</div>

<input id="fileInput" type="file" accept=".json" style="display:none">

<div style="text-align:center;margin-top:20px;">
<button class="btn btn-primary" onclick="startCompression()">🔬 圧縮開始</button>
</div>

</div>

<div class="progress-wrap" id="progressWrap">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText">処理中...</div>
</div>

<div class="result-area" id="resultArea">

<div class="card">

<h3>📊 圧縮結果</h3>

<div class="stats-grid">
<div class="stat-item"><div class="stat-value" id="statRate">-</div><div class="stat-label">圧縮率</div></div>
<div class="stat-item"><div class="stat-value" id="statInput">-</div><div class="stat-label">入力文字数</div></div>
<div class="stat-item"><div class="stat-value" id="statOutput">-</div><div class="stat-label">出力文字数</div></div>
<div class="stat-item"><div class="stat-value" id="statConvs">-</div><div class="stat-label">会話数</div></div>
</div>

<h3>📄 プレビュー</h3>

<div class="output-preview" id="outputPreview"></div>

</div>

</div>

</div>

<script>

const GAS_ENDPOINT =
"https://script.google.com/macros/s/AKfycbyxk8phS7ehOTymIj2NlkMmrIFKbfnTJ1KWjKQYnk-vQ9zhGz8qtuQUtqGtn-vJZqfS/exec";

let selectedFile=null;

fileInput.onchange=e=>{
selectedFile=e.target.files[0];
};

async function startCompression(){

if(!selectedFile){
alert("JSONファイルを選択してください");
return;
}

const text=await selectedFile.text();

const form=document.createElement("form");
form.method="POST";
form.action=GAS_ENDPOINT;
form.target="mdscFrame";

const input=document.createElement("input");
input.type="hidden";
input.name="json";
input.value=text;

form.appendChild(input);
document.body.appendChild(form);

form.submit();

}

</script>

<iframe name="mdscFrame" style="display:none;"></iframe>

</body>
</html>
