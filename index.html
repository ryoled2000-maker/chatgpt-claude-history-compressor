<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MDSC — ChatGPT & Claude 履歴圧縮</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#0a0e17;
  color:#e5e7eb;
  padding:20px;
}
.container{max-width:800px;margin:auto;}
button{
  padding:10px 20px;
  background:#06b6d4;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
button:disabled{opacity:0.5}
.dropzone{
  border:2px dashed #1f2937;
  padding:30px;
  text-align:center;
  margin-bottom:15px;
  cursor:pointer;
}
.result{margin-top:20px;white-space:pre-wrap;background:#111827;padding:15px;border-radius:6px;}
</style>
</head>
<body>

<div class="container">
<h2>MDSC — ミーディスク</h2>
<p>ChatGPT & Claude 履歴を意味密度で圧縮</p>

<div class="dropzone" onclick="document.getElementById('fileInput').click()">
JSONファイルをクリックして選択
</div>

<input type="file" id="fileInput" accept=".json" style="display:none">

<br>
<button id="compressBtn" disabled>圧縮開始</button>

<div class="result" id="result"></div>

<hr>
<h3>ツール</h3>
<a href="https://ryoled2000-maker.github.io/json-conversation-splitter/splitter.html" target="_blank">
JSON Splitter を開く
</a>

</div>

<script>

const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbyxk8phS7ehOTymIj2NlkMmrIFKbfnTJ1KWjKQYnk-vQ9zhGz8qtuQUtqGtn-vJZqfS/exec';

let selectedFile = null;

const fileInput = document.getElementById('fileInput');
const compressBtn = document.getElementById('compressBtn');
const resultArea = document.getElementById('result');

fileInput.addEventListener('change', e=>{
  if(e.target.files.length > 0){
    selectedFile = e.target.files[0];
    compressBtn.disabled = false;
  }
});

compressBtn.addEventListener('click', async ()=>{
  if(!selectedFile) return;

  compressBtn.disabled = true;
  resultArea.textContent = "処理中...";

  try{
    const text = await selectedFile.text();

    const response = await fetch(GAS_ENDPOINT,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:text
    });

    if(!response.ok){
      throw new Error("HTTP " + response.status);
    }

    const data = await response.json();

    if(!data.success){
      throw new Error(data.error || "圧縮失敗");
    }

    resultArea.textContent = data.data.markdown;

  }catch(err){
    resultArea.textContent = "❌ エラー: " + err.message;
  }

  compressBtn.disabled = false;
});

</script>

</body>
</html>
